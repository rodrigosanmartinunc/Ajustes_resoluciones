name: Scraper Boletin Oficial CBA

on:
  workflow_dispatch:        # ejecución manual con un click
  schedule:
    - cron: '0 8 * * *'   # también automático todos los días a las 8am

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Guardar resultados
        uses: actions/upload-artifact@v4
        with:
          name: resultados
          path: resultados.json   # el archivo que genere tu script
