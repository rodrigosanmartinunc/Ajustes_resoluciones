name: Scraper ERSeP — Boletín Oficial CBA

on:
  # Ejecución manual desde la UI de GitHub
  workflow_dispatch:
    inputs:
      dias_atras:
        description: 'Cuántos días hacia atrás buscar (default: 30)'
        required: false
        default: '30'

  # Ejecución automática: lunes a viernes a las 10am hora Argentina (UTC-3 → 13:00 UTC)
  schedule:
    - cron: '0 13 * * 1-5'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install requests beautifulsoup4 pdfplumber openpyxl

      - name: 🔍 Ejecutar scraper
        run: |
          DIAS=${{ github.event.inputs.dias_atras || '30' }}
          python scraper.py $DIAS

      - name: 📊 Mostrar resumen en log
        run: |
          echo "=== RESUMEN ==="
          cat resumen.json

      - name: 📁 Subir Excel como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: resultados-ersep-${{ github.run_number }}
          path: |
            resultados_ersep.xlsx
            resumen.json
          retention-days: 90

      # Opcional: guardar en el repo automáticamente (descomentá si querés historial)
      # - name: 💾 Commit resultados al repo
      #   run: |
      #     git config user.name "github-actions[bot]"
